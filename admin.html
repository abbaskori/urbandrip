<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Portal | Urban Drip</title>
    <link rel="icon" href="/logo.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
  </head>
  <body class="admin-body">

    <header class="admin-header">
      <a href="/">
        <img src="/logo.png" alt="Urban Drip" />
      </a>
      <span class="admin-header-title">Admin Portal</span>
      <a href="/" style="font-size:0.8rem;color:#5a5040;">← Back to Showroom</a>
    </header>

    <main class="admin-main">

      <!-- WhatsApp Auto-Fill -->
      <div class="admin-card">
        <h2 class="admin-card-title"><span>⚡</span> WhatsApp Quick Fill</h2>
        <div class="form-group">
          <label class="wa-paste-label">✦ Paste product details from WhatsApp</label>
          <textarea id="wa-paste" class="form-control" rows="3" placeholder="Paste watch/clothing details here — name, price, description will auto-fill below..."></textarea>
        </div>
      </div>

      <!-- Add Product Form -->
      <div class="admin-card">
        <h2 class="admin-card-title"><span>✦</span> Add New Product</h2>
        <form id="product-form">



          <div class="form-group">
            <label for="name">Product Name *</label>
            <input type="text" id="name" class="form-control" required placeholder="e.g. Rolex Submariner Date" />
          </div>

          <div class="form-group">
            <label for="category">Category *</label>
            <select id="category" class="form-control" required>
              <option value="Watches">⌚ Watches</option>
              <option value="Clothing">👕 Clothing</option>
            </select>
          </div>

          <div class="form-group">
            <label for="price">Price (INR ₹) *</label>
            <input type="number" id="price" class="form-control" required min="0" step="1" placeholder="e.g. 15000" />
          </div>

          <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" class="form-control" placeholder="Describe the product — condition, features, materials..."></textarea>
          </div>

          <div class="form-group">
            <label>Product Images *</label>
            <div class="file-upload-wrapper">
              <input type="file" id="media-upload" accept="image/*" multiple />
              <div class="file-upload-text">
                <span class="upload-icon">📸</span>
                <p>Click or drag images to upload</p>
                <small>Multiple images supported • Max 5MB each</small>
              </div>
            </div>
            <div id="preview-container" class="preview-container"></div>
          </div>

          <button type="submit" class="btn-submit" id="submit-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add to Showroom
          </button>

          <div id="status-message" class="status-message"></div>
        </form>
      </div>
      <div class="admin-card">
        <h2 class="admin-card-title"><span>✦</span> Product List</h2>
        <div id="product-list" class="product-list">
          <div class="product-list-content"></div>
        </div>
      </div>

    </main>

    <script type="module" src="/src/admin.js"></script>
  </body>
</html>
