<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin | Urban Drift</title>
  </head>
  <body>
    <header style="justify-content: center;">
      <a href="/" class="logo">
        <img src="/logo.png" alt="Urban Drift Logo" class="logo-img" />
      </a>
    </header>
    
    <main>
      <h1 class="page-title">Admin Portal</h1>
      <p class="page-subtitle">Manage showroom inventory and products.</p>
      
      <div class="admin-container glass-card" style="margin-bottom: 2rem;">
        <div class="form-group" style="margin-bottom: 0;">
          <label for="wa-paste" style="color: var(--accent);">⚡ WhatsApp Auto-Fill (Paste message here)</label>
          <textarea id="wa-paste" class="form-control" placeholder="Paste watch details from WhatsApp here... it will auto-fill the form below" style="min-height: 80px;"></textarea>
        </div>
      </div>

      <div class="admin-container glass-card">
        <form id="product-form">
          <div class="form-group">
            <label for="name">Product Name *</label>
            <input type="text" id="name" class="form-control" required placeholder="e.g. Rolex Submariner">
          </div>
          
          <div class="form-group">
            <label for="category">Category</label>
            <select id="category" class="form-control" required>
              <option value="Watches">Watches</option>
              <option value="Clothing">Clothing</option>
            </select>
          </div>
          
          <div class="form-group">
            <label for="price">Price (INR ₹) *</label>
            <input type="number" id="price" class="form-control" required min="0" step="1" placeholder="e.g. 15000">
          </div>
          
          <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" class="form-control" placeholder="Product details..."></textarea>
          </div>
          
          <div class="form-group">
            <label>Product Images *</label>
            <div class="file-upload-wrapper">
              <input type="file" id="media-upload" accept="image/*" multiple required>
              <div class="file-upload-text">
                <p>Click or drag images to upload</p>
                <small>Max file size: 5MB (Base64 encoding used)</small>
              </div>
            </div>
            <div id="preview-container" class="preview-container"></div>
          </div>
          
          <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">Add Product</button>
          
          <div id="status-message" class="status-message"></div>
        </form>
      </div>
    </main>

    <script type="module" src="/src/admin.js"></script>
  </body>
</html>
