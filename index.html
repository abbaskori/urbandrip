<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Urban Drift | Luxury Showroom</title>
  </head>
  <body>
    <header style="justify-content: center;">
      <a href="/" class="logo">
        <img src="/logo.png" alt="Urban Drift Logo" class="logo-img" />
      </a>
    </header>
    
    <main>
      <div class="hero">
        <h1 class="page-title">The Showroom</h1>
        <p class="page-subtitle">Discover our exclusive collection of luxury watches and clothing.</p>
      </div>

      <div class="controls-section">
        <div class="filter-group" id="category-filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="Watches">Watches</button>
          <button class="filter-btn" data-filter="Clothing">Clothing</button>
        </div>
      </div>
      
      <div class="showroom-container">
        <div id="products-grid" class="product-grid">
          <!-- Products will be injected here via JS -->
        </div>
      </div>
    </main>

    <!-- Product Detail Modal -->
    <div id="product-modal" class="modal-overlay" role="dialog" aria-modal="true">
      <div class="modal-container">
        <button class="close-modal-btn" id="close-modal" aria-label="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <div class="modal-content-grid">
          <!-- Left: Image Slider -->
          <div class="modal-media-showcase">
            <div class="media-viewer" id="modal-media-viewer"></div>
            <button class="slider-nav-btn prev" id="slider-prev" aria-label="Previous image">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15,18 9,12 15,6"/></svg>
            </button>
            <button class="slider-nav-btn next" id="slider-next" aria-label="Next image">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9,18 15,12 9,6"/></svg>
            </button>
            <div class="slider-indicators" id="slider-indicators"></div>
          </div>
          <!-- Right: Details -->
          <div class="modal-product-details">
            <p class="modal-category-tag" id="modal-category"></p>
            <h2 class="modal-title" id="modal-name"></h2>
            <p class="modal-price" id="modal-price"></p>
            <p class="modal-description" id="modal-description"></p>
            <div class="modal-wa-buttons">
              <p class="modal-wa-label">Contact us on WhatsApp</p>
              <a id="modal-wa-1" href="#" target="_blank" class="inquiry-btn modal-wa-btn">

                WhatsApp — Abbas
              </a>
              <a id="modal-wa-2" href="#" target="_blank" class="inquiry-btn modal-wa-btn modal-wa-btn-2">

                WhatsApp — Support
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/app.js"></script>
  </body>
</html>
